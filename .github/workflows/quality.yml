name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff vulture

      - name: Ruff dead-code and undefined checks
        run: python -m ruff check . --select F401,F821,F822,F841

      - name: Vulture dead-code scan
        run: python -m vulture . --exclude ".venv,uploads,__pycache__,.git" --min-confidence 80

      - name: Python compile check
        run: python -m compileall -q .

      - name: Frontend syntax check
        run: node --check static/app.js